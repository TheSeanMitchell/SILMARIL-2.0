<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SILMARIL · Raw Leaderboards (all 4 quadrants)</title>
<style>
  :root{--bg:#0a0a0a;--fg:#e8e8e8;--line:#2a2a2a;--soft:#141414;--dim:#888;--pos:#26a96a;--neg:#e0533d}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;padding:16px}
  h1{font-size:16px;letter-spacing:2px;margin:0 0 4px}.sub{color:var(--dim);font-size:11px;margin-bottom:16px}
  a{color:#6aa9ff}.back{margin-bottom:14px;display:inline-block}
  .q{border:1px solid var(--line);background:var(--soft);margin-bottom:14px;padding:10px}
  .qh{font-weight:bold;letter-spacing:1px;font-size:14px;border-bottom:2px solid;padding-bottom:6px;margin-bottom:8px}
  .champ{font-size:11px;color:var(--dim);margin-bottom:8px}.champ b{color:var(--fg)}
  table{width:100%;border-collapse:collapse;font-size:11px}th,td{text-align:left;padding:3px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--dim);font-weight:normal}.pos{color:var(--pos)}.neg{color:var(--neg)}.dim{color:var(--dim)}
  tr.win{font-weight:bold;background:rgba(255,255,255,.04)}
  .empty{color:var(--dim);font-style:italic;padding:8px}
</style></head>
<body>
<a class="back" href="index.html">&larr; back to command center</a>
<h1>RAW LEADERBOARDS &middot; ALL FOUR QUADRANTS</h1>
<div class="sub">Every strategy tested independently on each market's own universe. Champion shown per quadrant. Updated each cron cycle.</div>
<div id="boards"></div>
<script>
const QUADS=[['crypto','CRYPTO','#f7931a'],['stock','STOCK','#2f74ff'],['metal','METAL','#b9bcc4'],['energy','ENERGY','#22b07d']];
const f=(n,d=2)=>n==null||isNaN(n)?'\u2014':(+n).toFixed(d);
async function jget(u){try{const r=await fetch(u+'?t='+Date.now());return r.ok?await r.json():null;}catch(e){return null;}}
async function go(){let html='';
  for(const item of QUADS){const k=item[0],name=item[1],col=item[2];
    const lb=await jget('data/strategy_leaderboard_'+k+'.json');
    const champ=await jget('data/champion_'+k+'.json');
    html+='<div class="q"><div class="qh" style="color:'+col+';border-color:'+col+'">'+name+'</div>';
    if(!lb||!(lb.leaderboard||[]).length){
      html+='<div class="empty">No leaderboard yet \u2014 '+(k==='metal'||k==='energy'?'awaiting data feed (prices accumulating)':'accumulating')+'.</div></div>';
      continue;
    }
    const cname=(champ&&champ.champion)||null;
    const bt=lb.best_trusted||{};
    html+='<div class="champ">champion: <b style="color:'+col+'">'+(cname||'\u2014')+'</b> &middot; best edge '+f(bt.mean_net_pct)+'%/trade over '+(bt.trades||0)+' trades &middot; universe '+(lb.universe_size||'\u2014')+' names<br><span style="font-size:10px">'+((champ&&champ.reason)||lb.verdict||'')+'</span></div>';
    html+='<table><thead><tr><th>#</th><th>strategy</th><th>dir</th><th>trades</th><th>edge/trade</th><th>win%</th></tr></thead><tbody>';
    (lb.leaderboard||[]).slice(0,15).forEach(function(r,i){
      const win=r.strategy===cname?'win':'';
      html+='<tr class="'+win+'"><td>'+(i+1)+'</td><td>'+r.strategy+'</td><td class="dim">'+(r.dir||'')+'</td><td>'+(r.trades||0)+'</td><td class="'+((r.mean_net_pct||0)>=0?'pos':'neg')+'">'+f(r.mean_net_pct)+'%</td><td>'+f(r.win_pct,1)+'%</td></tr>';
    });
    html+='</tbody></table></div>';
  }
  document.getElementById('boards').innerHTML=html;
}
go();
</script></body></html>

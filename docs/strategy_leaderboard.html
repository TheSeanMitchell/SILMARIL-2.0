<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SILMARIL · Strategy Leaderboard</title>
<style>
  :root{--bg:#0a0e14;--panel:#121821;--line:#1f2a37;--ink:#e6edf3;--dim:#8b98a8;
        --green:#3fb950;--red:#f85149;--amber:#d29922;--blue:#58a6ff;--gold:#e3b341;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
       font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;padding:14px;max-width:980px;margin:auto}
  h1{font-size:16px;margin:0 0 2px;letter-spacing:.5px}
  .sub{color:var(--dim);font-size:12px;margin-bottom:12px}
  .verdict{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);
           border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:12px}
  .stat b{font-size:16px}
  table{width:100%;border-collapse:collapse;font-size:12px;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  th{text-align:right;color:var(--dim);font-weight:500;padding:7px 8px;border-bottom:1px solid var(--line);font-size:10px;text-transform:uppercase;cursor:pointer}
  th:first-child,td:first-child{text-align:left}
  td{padding:6px 8px;border-bottom:1px solid #161c26}
  tr:hover td{background:#161c26}
  .pos{color:var(--green)} .neg{color:var(--red)}
  .mr{color:var(--blue)} .mom{color:var(--amber)}
  .top td{background:rgba(227,179,65,.06)}
  .note{margin-top:12px;color:var(--dim);font-size:11px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;line-height:1.6}
  a{color:var(--blue)}
</style>
</head>
<body>
  <h1>STRATEGY LEADERBOARD</h1>
  <div class="sub" id="meta">loading…</div>
  <div class="verdict" id="verdict"></div>
  <div class="stats" id="stats"></div>
  <table id="tbl"><thead><tr>
    <th data-k="strategy">Strategy</th><th data-k="dir">Dir</th>
    <th data-k="trades">Trades</th><th data-k="win_pct">Win%</th>
    <th data-k="mean_net_pct">Net/Trade</th><th data-k="total_pct">Total</th>
  </tr></thead><tbody id="body"></tbody></table>
  <div class="note" id="note"></div>
  <div class="sub" style="margin-top:10px"><a href="paper_sim.html">→ Paper Sim Cockpit</a> · <a href="index.html">← Dashboard</a></div>

<script>
const $=id=>document.getElementById(id);
const pct=n=>(n==null?'—':(n>=0?'+':'')+Number(n).toFixed(n>=10||n<=-10?0:2)+'%');
const cls=n=>n>0?'pos':(n<0?'neg':'');
let DATA=[], sortK='mean_net_pct', desc=true;

function render(){
  DATA.sort((a,b)=>{const x=a[sortK],y=b[sortK];
    if(typeof x==='string')return desc?y.localeCompare(x):x.localeCompare(y);
    return desc?y-x:x-y;});
  $('body').innerHTML=DATA.map((r,i)=>`<tr class="${i<3?'top':''}">
    <td>${r.strategy}</td>
    <td class="${r.dir}">${r.dir.toUpperCase()}</td>
    <td>${r.trades}</td><td>${r.win_pct}%</td>
    <td class="${cls(r.mean_net_pct)}">${pct(r.mean_net_pct)}</td>
    <td class="${cls(r.total_pct)}">${pct(r.total_pct)}</td></tr>`).join('');
}
document.querySelectorAll('th').forEach(th=>th.onclick=()=>{
  const k=th.dataset.k; if(k===sortK)desc=!desc; else{sortK=k;desc=true;} render();});

async function load(){
  try{
    const r=await fetch('data/strategy_leaderboard.json?_='+Date.now());
    const d=await r.json();
    $('meta').textContent='as of '+new Date(d.generated_at).toLocaleString();
    $('verdict').innerHTML='🏆 '+(d.verdict||'');
    $('stats').innerHTML=`
      <div class="stat"><b>${d.n_strategies}</b> strategies tested</div>
      <div class="stat"><b>${d.tradeable_universe}</b> fresh names</div>
      <div class="stat"><b>${d.ghosts_excluded}</b> ghosts excluded</div>`;
    DATA=d.leaderboard||[]; render();
    $('note').innerHTML='<b>How to read this:</b> '+(d.note||'')+
      ' Click a column to sort. MR = mean-reversion (buy dips), MOM = momentum (buy strength).';
  }catch(e){ $('meta').textContent='strategy_leaderboard.json not found yet — runs next cycle.'; }
}
load(); setInterval(load,60000);
</script>
</body>
</html>

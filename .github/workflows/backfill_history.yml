name: Backfill History (jumpstart fingerprints)

concurrency:
  group: silmaril-state
  cancel-in-progress: false

# Manual one-shot: seeds news_history.json with real historical daily closes
# so charts, % chips, and fingerprints light up immediately. Safe + additive
# + idempotent (only adds missing dated rows). Run it once; re-run anytime.

on:
  workflow_dispatch:
    inputs:
      days:
        description: "How many days of history to backfill"
        required: false
        default: "30"
      tickers:
        description: "Comma-separated tickers (blank = whole signals.json universe)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests
      - name: Run backfill
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: |
          python scripts/backfill_history.py \
            --days "${{ github.event.inputs.days }}" \
            --tickers "${{ github.event.inputs.tickers }}"
      - name: Commit seeded history
        run: |
          git config user.name "silmaril-backfill"
          git config user.email "backfill@silmaril.local"
          git add docs/data/news_history.json
          git commit -m "backfill: seed historical daily closes for fingerprints" || echo "nothing to commit"
          git push || echo "nothing to push"

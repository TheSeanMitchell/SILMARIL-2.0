name: Cleanup Clutter (one-time)
on:
  workflow_dispatch:
    inputs:
      confirm: { description: 'Type CLEAN to confirm', required: true }
jobs:
  cleanup:
    if: ${{ github.event.inputs.confirm == 'CLEAN' }}
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/cleanup_clutter.py
      - run: |
          git config user.name "silmaril-bot"
          git config user.email "bot@silmaril"
          git add -A && git commit -m "2.6.1: remove kraken/alpaca + clutter" || echo "nothing"
          git push

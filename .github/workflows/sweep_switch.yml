name: Manual SWEEP Switch

concurrency:
  group: silmaril-state
  cancel-in-progress: false

# Operator-triggered: force every configured Alpaca account to liquidate
# non-vault holdings and park cash above $10k in SGOV. Use after a strong
# market day to lock in gains before overnight/pre-market risk.
#
# Two modes:
#   default  → drops a sweep_switch.flag file; next normal daily run consumes it
#   direct   → run the sweep RIGHT NOW (requires Alpaca secrets in this job)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'flag (drop flag for next cron) or direct (run now)'
        required: true
        default: 'flag'
        type: choice
        options:
          - flag
          - direct
      reason:
        description: 'Why you are sweeping (free text — recorded in summary)'
        required: false
        default: 'manual sweep'
      floor:
        description: 'Cash floor to retain per account (default 10000)'
        required: false
        default: '10000'

permissions:
  contents: write


jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SWEEP (flag mode)
        if: inputs.mode == 'flag'
        env:
          REASON: ${{ inputs.reason }}
        run: |
          python scripts/manual_sweep.py --flag-only --reason "$REASON"
          echo "Flag dropped. Next scheduled daily run will consume it."

      - name: Run SWEEP (direct mode)
        if: inputs.mode == 'direct'
        env:
          ALPACA_API_KEY:       ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:    ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_API_KEY_H3:    ${{ secrets.ALPACA_API_KEY_H3 }}
          ALPACA_API_SECRET_H3: ${{ secrets.ALPACA_API_SECRET_H3 }}
          ALPACA_API_KEY_H5:    ${{ secrets.ALPACA_API_KEY_H5 }}
          ALPACA_API_SECRET_H5: ${{ secrets.ALPACA_API_SECRET_H5 }}
          SILMARIL_SWEEP_SWITCH: '1'
          REASON: ${{ inputs.reason }}
          FLOOR: ${{ inputs.floor }}
        run: |
          python scripts/manual_sweep.py --reason "$REASON" --floor "$FLOOR"

      - name: Commit sweep summary (direct mode only)
        if: inputs.mode == 'direct'
        run: |
          git config user.name  "silmaril-bot"
          git config user.email "silmaril-bot@users.noreply.github.com"
          git add docs/data/sweep_protection.json docs/data/*_state.json || true
          if ! git diff --staged --quiet; then
            git commit -m "sweep: manual switch fired [skip ci]"
            git push
          else
            echo "no changes to commit"
          fi

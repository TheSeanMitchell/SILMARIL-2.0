name: Adversarial Stress Test (manual)

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Days of recent history to stress-test'
        required: false
        default: '7'

permissions:
  contents: write

jobs:
  stress:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stress test
        run: |
          python << 'PY'
          import json
          from datetime import date, timedelta
          from pathlib import Path
          from silmaril.learning.adversarial_stress import stress_test_signals, save_stress_results

          out = Path('docs/data')
          history = json.loads((out / 'history.json').read_text()) if (out / 'history.json').exists() else {'runs': []}

          lookback = int('${{ github.event.inputs.lookback_days }}')
          cutoff = (date.today() - timedelta(days=lookback)).isoformat()

          debates, returns = [], {}
          for run in history.get('runs', []):
              if run.get('date', '0000') < cutoff: continue
              for d in run.get('debates', []):
                  debates.append(d)
                  ndr = d.get('next_day_return')
                  if ndr is not None:
                      returns[d.get('ticker', '')] = ndr

          if not debates:
              print('No debates in window — nothing to stress-test')
              results = {'computed_at': '', 'scenarios': {}, 'robustness_verdict': 'NO_DATA'}
          else:
              results = stress_test_signals(debates, returns)
              print('Verdict:', results.get('robustness_verdict'))

          save_stress_results(out / 'stress_test_results.json', results)
          PY

      - name: Commit results
        run: |
          git config user.name 'silmaril-bot'
          git config user.email 'silmaril-bot@users.noreply.github.com'
          git add docs/data/stress_test_results.json
          git diff --staged --quiet || git commit -m "🧪 adversarial stress test $(date -u +%Y-%m-%d)"
          git push || true

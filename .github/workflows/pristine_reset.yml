name: Pristine Reset (wipe account state)

concurrency:
  group: silmaril-state
  cancel-in-progress: false

# Manual one-shot. Wipes selected account(s) trading state to a clean
# baseline — for a paper re-baseline OR a live-money cutover rehearsal.
# Does NOT touch agents/scoring/learning. PAIR with the matching Alpaca
# dashboard reset/funding.

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: "'all' or comma list: LEGACY,HARVEST_3,HARVEST_5"
        required: true
        default: "all"
      baseline:
        description: "Starting balance per account"
        required: false
        default: "10000"

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run pristine reset
        run: |
          python scripts/pristine_reset.py \
            --accounts "${{ github.event.inputs.accounts }}" \
            --baseline "${{ github.event.inputs.baseline }}"
      - name: Commit clean state
        run: |
          git config user.name "silmaril-reset"
          git config user.email "reset@silmaril.local"
          git add docs/data/
          git commit -m "pristine reset: ${{ github.event.inputs.accounts }} to clean baseline" || echo "nothing to commit"
          git push || echo "nothing to push"

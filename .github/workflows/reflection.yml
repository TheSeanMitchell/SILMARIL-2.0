name: Daily Reflection Bootstrap

concurrency:
  group: silmaril-state
  cancel-in-progress: false

on:
  schedule:
    # 4:30pm ET / 8:30pm UTC — after market close
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bootstrap reflection placeholder
        run: |
          python << 'PY'
          import json
          from datetime import date
          from pathlib import Path
          p = Path('docs/data/reflections.json')
          data = {'current': {}, 'history': []}
          if p.exists():
              try: data = json.loads(p.read_text())
              except Exception: pass
          today = date.today().isoformat()
          cur = data.get('current') or {}
          if cur.get('text'):
              data.setdefault('history', []).append(cur)
          data['current'] = {
              'date': today,
              'author': 'Operator',
              'text': '',
              'placeholder': True,
              'instructions': (
                  "Replace this with 1-3 sentences summarizing today's outcomes "
                  "and what rule the agents should consider tomorrow. "
                  "Tip: paste today's signals.json + scoring.json into Perplexity "
                  "or Grok with: 'What 2-3 sentence rule should trading agents "
                  "internalize for tomorrow given these results?'"
              ),
          }
          p.parent.mkdir(parents=True, exist_ok=True)
          p.write_text(json.dumps(data, indent=2))
          print('Reflection placeholder written:', today)
          PY

      - name: Commit
        run: |
          git config user.name 'silmaril-bot'
          git config user.email 'silmaril-bot@users.noreply.github.com'
          git add docs/data/reflections.json
          git diff --staged --quiet || git commit -m "🪞 reflection placeholder $(date -u +%Y-%m-%d)"
          git push || true

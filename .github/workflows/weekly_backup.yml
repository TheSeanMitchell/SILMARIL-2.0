name: Weekly Learning Backup

on:
  schedule:
    # Sunday midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Snapshot all protected learning state
        run: |
          python -c "
          from pathlib import Path
          from silmaril.learning.persistence_guard import backup_learning_state
          archive = backup_learning_state(Path('docs/data'), Path('docs/data/_backups'), label='weekly')
          print('Backup:', archive)
          "

      - name: Prune old backups (keep 12 weeks)
        run: |
          python -c "
          from pathlib import Path
          d = Path('docs/data/_backups')
          if d.exists():
              files = sorted(d.glob('learning_backup_*.tar.gz'))
              for f in files[:-12]:
                  f.unlink()
                  print('pruned', f.name)
          "

      - name: Commit
        run: |
          git config user.name 'silmaril-bot'
          git config user.email 'silmaril-bot@users.noreply.github.com'
          git add docs/data/_backups/
          git diff --staged --quiet || git commit -m "💾 weekly learning backup $(date -u +%Y-%m-%d)"
          git push || true

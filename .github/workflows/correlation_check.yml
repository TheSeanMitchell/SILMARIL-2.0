name: Nightly Correlation Matrix

on:
  schedule:
    # 1am UTC nightly
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  correlation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute correlation matrix
        run: |
          python << 'PY'
          import json
          from pathlib import Path
          from silmaril.learning.correlation_matrix import compute_position_correlations, append_to_history

          out = Path('docs/data')
          portfolios_path = out / 'agent_portfolios.json'
          history_path = out / 'price_history.json'

          if not portfolios_path.exists():
              print('No portfolios — skipping')
              exit(0)

          portfolios = json.loads(portfolios_path.read_text())
          price_history = {}
          if history_path.exists():
              try: price_history = json.loads(history_path.read_text())
              except Exception: price_history = {}

          snap = compute_position_correlations(portfolios, price_history)
          append_to_history(out / 'correlation_history.json', snap)
          print('Alerts:', len(snap.get('concentration_alerts', [])))
          PY

      - name: Commit
        run: |
          git config user.name 'silmaril-bot'
          git config user.email 'silmaril-bot@users.noreply.github.com'
          git add docs/data/correlation_history.json
          git diff --staged --quiet || git commit -m "🔗 correlation snapshot $(date -u +%Y-%m-%d)"
          git push || true

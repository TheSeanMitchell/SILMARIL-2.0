name: Site Reset (preserves all learning)

concurrency:
  group: silmaril-state
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET to confirm. Learning state is ALWAYS preserved.'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'RESET'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backup ALL learning state before reset
        run: |
          python -c "
          from pathlib import Path
          from silmaril.learning.persistence_guard import backup_learning_state
          archive = backup_learning_state(Path('docs/data'), Path('docs/data/_backups'), label='pre_reset')
          print('Backup:', archive)
          "

      - name: Safe reset (preserves PROTECTED_LEARNING_FILES)
        run: |
          python -c "
          from pathlib import Path
          from silmaril.learning.persistence_guard import safe_reset, verify_persistence
          report = safe_reset(Path('docs/data'), keep_protected=True)
          print('Removed:', len(report['removed']), 'files')
          print('Kept (protected):', len(report['kept']), 'files')
          for f in report['kept'][:10]: print('  KEPT:', f)
          health = verify_persistence(Path('docs/data'))
          assert len(health['present']) > 0, 'CRITICAL: Learning state wiped!'
          print('Learning state intact:', len(health['present']), 'protected files')
          "

      - name: Commit reset
        run: |
          git config user.name 'silmaril-bot'
          git config user.email 'silmaril-bot@users.noreply.github.com'
          git add docs/data/
          git diff --staged --quiet || git commit -m "🔄 site reset (learning preserved) $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

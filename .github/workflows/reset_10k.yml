name: Reset Compounders to $10K

concurrency:
  group: silmaril-state
  cancel-in-progress: false

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run reset
        run: python scripts/reset_compounders_10k.py

      - name: Commit
        run: |
          git config user.name 'silmaril-bot'
          git config user.email 'silmaril-bot@users.noreply.github.com'
          git add docs/data/
          git diff --staged --quiet || git commit -m \
            "💰 Reset all compounders to \$10K for grocery harvest system"
          git push || echo "nothing to push"
